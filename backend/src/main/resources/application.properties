spring.application.name=corridor-api
server.port=8080

# Jackson
spring.jackson.default-property-inclusion=non_null

# External APIs
external.inaturalist.base-url=https://api.inaturalist.org/v1
external.gbif.base-url=https://api.gbif.org/v1
external.copernicus.base-url=https://land.copernicus.eu/api
external.overpass.base-url=https://overpass-api.de/api/interpreter
external.rijkswaterstaat.base-url=https://geo.rijkswaterstaat.nl
external.solvimon.base-url=${SOLVIMON_BASE_URL:https://test.mcp.solvimon.com}
external.solvimon.api-key=${SOLVIMON_API_KEY:}

# Rate limiting
ratelimit.requests-per-minute=60

# WebClient
webclient.max-in-memory-size-bytes=16777216
webclient.connect-timeout-ms=10000
webclient.response-timeout-ms=30000

# Anthropic
anthropic.api.key=${ANTHROPIC_API_KEY:}
anthropic.model=claude-sonnet-4-6
anthropic.narrative.max-tokens=512
# Bundle cache TTL in seconds (default 15 min)
bundle.cache.ttl-seconds=900
