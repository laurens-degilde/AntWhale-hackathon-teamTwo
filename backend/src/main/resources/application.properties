spring.application.name=corridor-api
server.port=8080

# Jackson
spring.jackson.default-property-inclusion=non_null

# External APIs
external.inaturalist.base-url=https://api.inaturalist.org/v1
external.gbif.base-url=https://api.gbif.org/v1
external.copernicus.base-url=https://land.copernicus.eu/api
external.overpass.base-url=https://overpass-api.de/api/interpreter
external.rijkswaterstaat.base-url=https://geo.rijkswaterstaat.nl
external.solvimon.base-url=${SOLVIMON_BASE_URL:https://test.mcp.solvimon.com}
external.solvimon.api-key=${SOLVIMON_API_KEY:}

# Rate limiting
ratelimit.requests-per-minute=60

# WebClient
# 128 MB — covers ~25 km × 25 km building-heavy bboxes at NL density. Larger regions should
# be queried without buildings (see OsmRasteriserService).
webclient.max-in-memory-size-bytes=134217728
webclient.connect-timeout-ms=10000
# Overpass can routinely take 30–60s on busy bboxes; allow headroom.
webclient.response-timeout-ms=90000

# Circuitscape (Julia) bridge — connectivity + pinch-point pipeline
# Path to the julia binary; override if not on PATH.
circuitscape.julia-bin=julia
# Hard cap on a single Circuitscape solve (seconds). Cold Julia startup is ~5–10s.
circuitscape.timeout-seconds=300
# Cell size in metres for the ASCII Grid header. Affects absolute current values, not patterns.
circuitscape.cell-size-m=100

# Corridor pipeline (CorridorPipeline)
# Side length of the rasterised resistance grid (gridSize × gridSize).
corridor.grid-size=64
# A cell becomes a habitat-patch candidate when its resistance ≤ this value.
corridor.habitat-resistance-threshold=5.0
# Minimum connected-component size (cells) to count as a patch.
corridor.min-patch-cells=5
# Cap on focal nodes per Circuitscape run (pairwise scales O(N²)).
corridor.max-focal-nodes=8
# Long-lived cache so the boot-time pre-warm survives the demo session.
corridor.cache-ttl-seconds=21600

# Anthropic
anthropic.api.key=${ANTHROPIC_API_KEY:}
anthropic.model=claude-sonnet-4-6
anthropic.narrative.max-tokens=512
# Bundle cache TTL in seconds (default 15 min)
bundle.cache.ttl-seconds=900
